name: Release ma-agent

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: zip
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --bin ma-agent --manifest-path agent/Cargo.toml --target ${{ matrix.target }}

      - name: Smoke test binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH="target/${{ matrix.target }}/release/ma-agent${{ matrix.binary_ext }}"
          "$BIN_PATH" --help >/dev/null

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binPath = "target/${{ matrix.target }}/release/ma-agent${{ matrix.binary_ext }}"
          & $binPath --help | Out-Null

      - name: Package archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-manual}"
          ASSET_BASENAME="ma-agent-${VERSION}-${{ matrix.target }}"
          BIN_PATH="target/${{ matrix.target }}/release/ma-agent${{ matrix.binary_ext }}"
          cp "$BIN_PATH" "dist/ma-agent${{ matrix.binary_ext }}"
          tar -C dist -czf "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}" "ma-agent${{ matrix.binary_ext }}"
          shasum -a 256 "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}" > "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}.sha256"

      - name: Package archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-manual}"
          ASSET_BASENAME="ma-agent-${VERSION}-${{ matrix.target }}"
          BIN_PATH="target/${{ matrix.target }}/release/ma-agent${{ matrix.binary_ext }}"
          cp "$BIN_PATH" "dist/ma-agent${{ matrix.binary_ext }}"
          ditto -c -k --sequesterRsrc --keepParent "dist/ma-agent${{ matrix.binary_ext }}" "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}"
          shasum -a 256 "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}" > "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'manual' }
          $assetBase = "ma-agent-$version-${{ matrix.target }}"
          $binPath = "target/${{ matrix.target }}/release/ma-agent${{ matrix.binary_ext }}"
          Copy-Item $binPath "dist/ma-agent${{ matrix.binary_ext }}"
          Compress-Archive -Path "dist/ma-agent${{ matrix.binary_ext }}" -DestinationPath "dist/$assetBase.${{ matrix.archive_ext }}" -Force
          $hash = (Get-FileHash "dist/$assetBase.${{ matrix.archive_ext }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  $assetBase.${{ matrix.archive_ext }}" | Out-File -FilePath "dist/$assetBase.${{ matrix.archive_ext }}.sha256" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ma-agent-${{ matrix.target }}
          path: |
            dist/*.${{ matrix.archive_ext }}
            dist/*.${{ matrix.archive_ext }}.sha256

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
