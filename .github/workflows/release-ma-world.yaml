name: Release ma-world

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: zip
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --bin ma-world --target ${{ matrix.target }}

      - name: Smoke test binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH="target/${{ matrix.target }}/release/ma-world${{ matrix.binary_ext }}"
          "$BIN_PATH" --help >/dev/null

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binPath = "target/${{ matrix.target }}/release/ma-world${{ matrix.binary_ext }}"
          & $binPath --help | Out-Null

      - name: Import macOS signing certificate (optional)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MA_WORLD_MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MA_WORLD_MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${MACOS_CERT_PASSWORD:-}" ]; then
            echo "Skipping macOS certificate import (secrets missing)."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/ma-world-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ma-world-signing.keychain-db"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Sign macOS binary (optional)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MA_WORLD_MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CODESIGN_IDENTITY:-}" ]; then
            echo "Skipping macOS code signing (identity secret missing)."
            exit 0
          fi
          BIN_PATH="target/${{ matrix.target }}/release/ma-world${{ matrix.binary_ext }}"
          codesign --force --options runtime --timestamp --sign "$MACOS_CODESIGN_IDENTITY" "$BIN_PATH"

      - name: Decode Windows signing certificate (optional)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.MA_WORLD_WINDOWS_CERT_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PFX_BASE64)) {
            Write-Host "Skipping Windows cert decode (secret missing)."
            exit 0
          }
          $pfxPath = "$env:RUNNER_TEMP\ma-world-signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          "WINDOWS_SIGNING_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Sign Windows binary (optional)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.MA_WORLD_WINDOWS_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_PATH) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)) {
            Write-Host "Skipping Windows signing (signing secrets missing)."
            exit 0
          }
          $binPath = "target/${{ matrix.target }}/release/ma-world${{ matrix.binary_ext }}"
          signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f "$env:WINDOWS_SIGNING_PFX_PATH" /p "$env:WINDOWS_CERT_PASSWORD" "$binPath"

      - name: Package archive (Unix)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-manual}"
          ASSET_BASENAME="ma-world-${VERSION}-${{ matrix.target }}"
          BIN_PATH="target/${{ matrix.target }}/release/ma-world${{ matrix.binary_ext }}"
          cp "$BIN_PATH" "dist/ma-world${{ matrix.binary_ext }}"
          tar -C dist -czf "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}" "ma-world${{ matrix.binary_ext }}"
          shasum -a 256 "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}" > "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}.sha256"

      - name: Package archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-manual}"
          ASSET_BASENAME="ma-world-${VERSION}-${{ matrix.target }}"
          BIN_PATH="target/${{ matrix.target }}/release/ma-world${{ matrix.binary_ext }}"
          cp "$BIN_PATH" "dist/ma-world${{ matrix.binary_ext }}"
          ditto -c -k --sequesterRsrc --keepParent "dist/ma-world${{ matrix.binary_ext }}" "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}"
          shasum -a 256 "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}" > "dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}.sha256"

      - name: Notarize macOS archive (optional)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.MA_WORLD_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.MA_WORLD_APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.MA_WORLD_APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ] || [ -z "${APPLE_APP_PASSWORD:-}" ]; then
            echo "Skipping macOS notarization (Apple secrets missing)."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME:-manual}"
          ASSET_BASENAME="ma-world-${VERSION}-${{ matrix.target }}"
          ARCHIVE_PATH="dist/${ASSET_BASENAME}.${{ matrix.archive_ext }}"
          xcrun notarytool submit "$ARCHIVE_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'manual' }
          $assetBase = "ma-world-$version-${{ matrix.target }}"
          $binPath = "target/${{ matrix.target }}/release/ma-world${{ matrix.binary_ext }}"
          Copy-Item $binPath "dist/ma-world${{ matrix.binary_ext }}"
          Compress-Archive -Path "dist/ma-world${{ matrix.binary_ext }}" -DestinationPath "dist/$assetBase.${{ matrix.archive_ext }}" -Force
          $hash = (Get-FileHash "dist/$assetBase.${{ matrix.archive_ext }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  $assetBase.${{ matrix.archive_ext }}" | Out-File -FilePath "dist/$assetBase.${{ matrix.archive_ext }}.sha256" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ma-world-${{ matrix.target }}
          path: |
            dist/*.${{ matrix.archive_ext }}
            dist/*.${{ matrix.archive_ext }}.sha256

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
